{% if href %}
  <a href="{{ href }}" class="sh-btn {% if variant %}sh-btn-{{ variant }}{% else %}sh-btn-primary{% endif %} {{ class }}">
    {{ text }}
  </a>
{% else %}
  <button type="{{ type|default:'button' }}" class="sh-btn {% if variant %}sh-btn-{{ variant }}{% else %}sh-btn-primary{% endif %} {{ class }}">
    {{ text }}
  </button>
{% endif %}
