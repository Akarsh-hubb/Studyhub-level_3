{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="sh-auth-container">
                <div class="sh-card">
                    <div class="text-center">
                        <div class="mb-4">
                            <div class="rounded-circle bg-success text-white d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px; font-size: 32px;">
                                ✓
                            </div>
                        </div>
                        
                        <h1 class="fw-bold mb-2">Password Reset Complete</h1>
                        <p class="text-muted mt-3 mb-4">
                            Your password has been set. You may go ahead and log in now.
                        </p>

                        <hr class="my-4">
                        {% include 'components/button.html' with text="Log In" href="/login/" variant="primary" class="sh-btn-block" %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
